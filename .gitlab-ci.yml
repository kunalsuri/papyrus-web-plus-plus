    # Start backend for Cypress tests in background
    #- java -Dsirius.components.cors.allowedCredentials=true -Dsirius.components.cors.allowedOriginPatterns=* -jar backend/papyrus-web/target/papyrus-web-$WEBAPP_VERSION.jar --spring.datasource.url=$SPRING_DATASOURCE_URL --spring.datasource.username=$SPRING_DATASOURCE_USERNAME --spring.datasource.password=$SPRING_DATASOURCE_PASSWORD --spring.liquibase.change-log=classpath:db/changelog/papyrus-web.db.changelog.xml &
    #- BACKEND_PID=$!

    # Wait for the backend to start
    #- sleep 200

    # Cypress tests
    #- cd integration-tests
    #- npm install
    #- npx cypress run

    # Stop the backend server
    #- kill $BACKEND_PID
  artifacts:
    paths:
      - backend/papyrus-web/target/papyrus-web-*.jar
      - backend/papyrus-web/target/classes/
      - backend/papyrus-web/target/test-classes/
      - backend/papyrus-web/target/surefire-reports/
      - backend/papyrus-web-test-coverage/target/site/jacoco-aggregate/
    reports:
      junit:
        - backend/**/target/surefire-reports/*.xml
      #- integration-tests/cypress/screenshots/
      #- integration-tests/cypress/videos/
      #- integration-tests/cypress/results/
      #- integration-tests/cypress/reports/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"

cypress tests:
  stage: test
  tags:
    - ctx:medium
  needs:
    - job: "build"
      artifacts: true
  services:
    - name: quay.io/sclorg/postgresql-15-c9s
      alias: postgres
  image: cypress/included:12.17.4
  extends: .ef-repo-eclipse-org
  variables:
    NODE_VERSION: "22.16.0"
    NODE_DIR: "$CI_PROJECT_DIR/.node"
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres/papyrus-web-db"
    POSTGRESQL_DATABASE: papyrus-web-db # used by the postgre image
    POSTGRESQL_USER: dbuser # used by the postgre image
    POSTGRESQL_PASSWORD: dbpwd # used by the postgre image
    SPRING_DATASOURCE_USERNAME: dbuser
    SPRING_DATASOURCE_PASSWORD: dbpwd
  before_script:
    # Install Node.js
    - mkdir -p "$NODE_DIR"
    - wget https://nodejs.org/dist/v$NODE_VERSION/node-v$NODE_VERSION-linux-x64.tar.gz
    - tar -xzf node-v$NODE_VERSION-linux-x64.tar.gz --strip-components=1 -C "$NODE_DIR"
    - export PATH="$NODE_DIR/bin:$PATH"
    # Install Java 21
    - wget https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.11%2B10/OpenJDK21U-jdk_x64_linux_hotspot_21.0.11_10.tar.gz
    - tar -xzvf OpenJDK21U-jdk_x64_linux_hotspot_21.0.11_10.tar.gz
    - export JAVA_HOME=./jdk-21.0.11+10
    - export PATH=$JAVA_HOME/bin:$PATH
  script:
    # Start backend for Cypress tests in background
    - export WEBAPP_VERSION=$(grep version frontend/package.json | awk -F \" '{print $4}')
    - java -Dsirius.components.cors.allowedCredentials=true -Dsirius.components.cors.allowedOriginPatterns=* -jar backend/papyrus-web/target/papyrus-web-$WEBAPP_VERSION.jar --spring.datasource.url=$SPRING_DATASOURCE_URL --spring.datasource.username=$SPRING_DATASOURCE_USERNAME --spring.datasource.password=$SPRING_DATASOURCE_PASSWORD --spring.liquibase.change-log=classpath:db/changelog/papyrus-web.db.changelog.xml &
    - BACKEND_PID=$!

    # Wait for the backend to start
    - sleep 200 # required

    # Cypress tests
    - cd integration-tests
    - npm install
    - npx cypress run --config baseUrl=http://127.0.0.1:8080 --env baseAPIUrl=http://127.0.0.1:8080

    # Stop the backend server
    - kill $BACKEND_PID
  artifacts:
    when: always
    paths:
      - integration-tests/target/screenshots/**/*.png
    reports:
      junit:
        - integration-tests/target/*.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH # on developper branch
