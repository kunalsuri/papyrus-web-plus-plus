    - tar -xzvf OpenJDK21U-jdk_x64_linux_hotspot_21.0.11_10.tar.gz
    - export JAVA_HOME=./jdk-21.0.11+10
    - export PATH=$JAVA_HOME/bin:$PATH
  script:
    # Backend tests
    - mvn $MAVEN_CLI_OPTS test -f backend/pom.xml --settings settings.xml
